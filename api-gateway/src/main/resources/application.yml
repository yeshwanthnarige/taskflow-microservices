server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        - id: auth-service-local
          uri: http://localhost:8081
          predicates:
            - Path=/local/api/auth/**
          filters:
            - RewritePath=/local(?<segment>/?.*), ${segment}
        - id: project-service
          uri: http://project-service:8082
          predicates:
            - Path=/api/projects/**
        - id: project-service-local
          uri: http://localhost:8082
          predicates:
            - Path=/local/api/projects/**
          filters:
            - RewritePath=/local(?<segment>/?.*), ${segment}
        - id: task-service
          uri: http://task-service:8083
          predicates:
            - Path=/api/tasks/**
        - id: task-service-local
          uri: http://localhost:8083
          predicates:
            - Path=/local/api/tasks/**
          filters:
            - RewritePath=/local(?<segment>/?.*), ${segment}
        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/api/notifications/**
        - id: notification-service-local
          uri: http://localhost:8084
          predicates:
            - Path=/local/api/notifications/**
          filters:
            - RewritePath=/local(?<segment>/?.*), ${segment}
